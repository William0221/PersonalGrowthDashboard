<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自然百科 — 魚．植物．中藥</title>
<style>
  :root{
    --bg:#f4f1ea; --card:#fffdf8; --ink:#2f3a33; --sub:#6b7a6f;
    --line:#e2dccd; --shadow:0 4px 18px rgba(60,70,55,.10);
    --fish:#2f7fa8; --fish-bg:#e7f2f8;
    --plant:#4a8a3c; --plant-bg:#eaf4e4;
    --herb:#a8682f; --herb-bg:#f6ece0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  header{text-align:center;padding:34px 20px 18px}
  header h1{font-size:30px;letter-spacing:2px;font-weight:800}
  header p{color:var(--sub);margin-top:6px;font-size:15px}
  .wrap{max-width:1080px;margin:0 auto;padding:0 18px 60px}

  .controls{position:sticky;top:0;z-index:20;background:var(--bg);
    padding:14px 0 12px;display:flex;flex-direction:column;gap:12px;align-items:center}
  .search{width:100%;max-width:480px;position:relative}
  .search input{width:100%;padding:12px 16px 12px 42px;border:1px solid var(--line);
    border-radius:30px;font-size:15px;background:var(--card);color:var(--ink);outline:none}
  .search input:focus{border-color:#bcae8e}
  .search svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);opacity:.45}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .tab{padding:8px 18px;border-radius:24px;border:1px solid var(--line);background:var(--card);
    cursor:pointer;font-size:14px;font-weight:600;color:var(--sub);transition:.18s;user-select:none}
  .tab:hover{transform:translateY(-1px)}
  .tab.active{color:#fff}
  .tab[data-cat="all"].active{background:#5b6b5e;border-color:#5b6b5e}
  .tab[data-cat="fish"].active{background:var(--fish);border-color:var(--fish)}
  .tab[data-cat="plant"].active{background:var(--plant);border-color:var(--plant)}
  .tab[data-cat="herb"].active{background:var(--herb);border-color:var(--herb)}
  .sortsel{padding:8px 14px;border-radius:24px;border:1px solid var(--line);background:var(--card);
    color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;outline:none}

  .count{color:var(--sub);font-size:13px;text-align:center;margin:4px 0 14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;
    cursor:pointer;box-shadow:var(--shadow);transition:.2s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-4px);box-shadow:0 10px 26px rgba(60,70,55,.16)}
  .thumb{height:140px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .thumb.fish{background:var(--fish-bg)} .thumb.plant{background:var(--plant-bg)} .thumb.herb{background:var(--herb-bg)}
  .thumb .emoji{font-size:54px;line-height:1}
  .thumb img{width:100%;height:100%;object-fit:cover;display:none}
  .card-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:6px}
  .card h3{font-size:18px;font-weight:700}
  .card .latin{font-size:12px;color:var(--sub);font-style:italic}
  .pill{align-self:flex-start;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:2px}
  .pill.fish{background:var(--fish-bg);color:var(--fish)}
  .pill.plant{background:var(--plant-bg);color:var(--plant)}
  .pill.herb{background:var(--herb-bg);color:var(--herb)}
  .card .teaser{font-size:13px;color:var(--sub)}
  .card.dim{opacity:.42}
  .empty{text-align:center;color:var(--sub);padding:60px 0;font-size:15px}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(40,46,40,.55);display:none;
    align-items:flex-start;justify-content:center;padding:30px 16px;z-index:50;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{background:var(--card);border-radius:20px;max-width:580px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;animation:pop .22s ease}
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
  .m-photo{height:200px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .m-photo.fish{background:linear-gradient(135deg,#2f7fa8,#4ba3c9)}
  .m-photo.plant{background:linear-gradient(135deg,#4a8a3c,#73b85e)}
  .m-photo.herb{background:linear-gradient(135deg,#a8682f,#c9914e)}
  .m-photo .emoji{font-size:80px}
  .m-photo img{width:100%;height:100%;object-fit:cover;display:none}
  .m-credit{position:absolute;bottom:6px;right:10px;font-size:10px;color:#fff;opacity:.8;
    background:rgba(0,0,0,.3);padding:2px 7px;border-radius:10px;display:none}
  .close{position:absolute;top:14px;right:16px;font-size:24px;cursor:pointer;color:#fff;
    width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.35);border:none;line-height:1}
  .close:hover{background:rgba(0,0,0,.55)}
  .modal-title{padding:18px 26px 0}
  .modal-title h2{font-size:24px}
  .modal-title .m-latin{font-style:italic;color:var(--sub);font-size:13px;margin-top:2px}
  .modal-body{padding:18px 26px 26px}
  .sec{margin-bottom:18px}
  .sec:last-child{margin-bottom:0}
  .sec h4{font-size:13px;font-weight:800;letter-spacing:1px;color:var(--sub);margin-bottom:8px}
  .sec p{font-size:15px}
  .tags{display:flex;flex-wrap:wrap;gap:7px}
  .tag{background:var(--bg);border:1px solid var(--line);border-radius:18px;padding:5px 12px;font-size:13px;font-weight:600}
  table.nutri{width:100%;border-collapse:collapse;font-size:14px}
  table.nutri td{padding:7px 4px;border-bottom:1px solid var(--line)}
  table.nutri td:first-child{color:var(--sub)}
  table.nutri td:last-child{text-align:right;font-weight:700}
  .basis{font-size:12px;color:var(--sub);margin-top:6px}
  .links{display:flex;flex-wrap:wrap;gap:8px}
  .lk{display:inline-flex;align-items:center;gap:5px;text-decoration:none;font-size:13px;font-weight:600;
    padding:7px 13px;border-radius:20px;border:1px solid var(--line);color:var(--ink);background:var(--bg)}
  .lk:hover{border-color:#bcae8e;background:#efe9d8}
  footer{text-align:center;color:var(--sub);font-size:12px;padding:20px;line-height:1.7}
</style>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<footer>

const grid=document.getElementById('grid'),empty=document.getElementById('empty'),
      countEl=document.getElementById('count'),searchEl=document.getElementById('search'),
      sortEl=document.getElementById('sort');
let curCat='all';

function nutVal(d,label){
  if(!d.nutri100) return null;
  const row=d.nutri100.find(r=>(r[0]===label||r[0].indexOf(label)===0));
  if(!row) return null;
  const n=parseFloat(String(row[1]).replace(/[^0-9.]/g,''));
  return isNaN(n)?null:n;
}
function nutText(d,label){
  const row=d.nutri100&&d.nutri100.find(r=>(r[0]===label||r[0].indexOf(label)===0));
  return row?row[1]:'—';
}
const imgCache={};

function wikiUrl(t){return 'https://zh.wikipedia.org/wiki/'+encodeURIComponent(t);}

async function fetchOne(lang,title){
  try{
    const u='https://'+lang+'.wikipedia.org/w/api.php?action=query&format=json&origin=*&redirects=1&prop=pageimages&piprop=thumbnail&pithumbsize=480&titles='+encodeURIComponent(title);
    const r=await fetch(u); const j=await r.json();
    const p=Object.values(j.query.pages)[0];
    return (p&&p.thumbnail)?p.thumbnail.source:null;
  }catch(e){ return null; }
}
async function fetchImg(d){
  if(d.name in imgCache) return imgCache[d.name];
  const cands=[['zh',d.wiki]];
  (d.alt||[]).forEach(a=>{ const i=a.indexOf(':'); cands.push([a.slice(0,i),a.slice(i+1)]); });
  let src=null;
  for(const c of cands){ src=await fetchOne(c[0],c[1]); if(src) break; }
  imgCache[d.name]=src;
  return src;
}
function applyImg(d,imgEl){
  fetchImg(d).then(src=>{ if(src){ imgEl.src=src; imgEl.style.display='block';
    const em=imgEl.parentElement.querySelector('.emoji'); if(em) em.style.display='none'; } });
}

function render(){
  const q=searchEl.value.trim().toLowerCase();
  const list=DATA.filter(d=>{
    if(curCat!=='all'&&d.cat!==curCat) return false;
    if(!q) return true;
    return (d.name+d.latin+d.taxo+d.benefit+d.nutrients.join('')).toLowerCase().includes(q);
  });
  const sortKey=sortEl.value;
  if(sortKey){
    list.sort((a,b)=>{
      const va=nutVal(a,sortKey),vb=nutVal(b,sortKey);
      if(va===null&&vb===null) return 0;
      if(va===null) return 1;
      if(vb===null) return -1;
      return vb-va;
    });
  }
  grid.innerHTML='';
  list.forEach(d=>{
    const idx=DATA.indexOf(d),c=CAT[d.cat];
    const card=document.createElement('div'); card.className='card'+(sortKey&&nutVal(d,sortKey)===null?' dim':'');
    card.innerHTML=`
      <div class="thumb ${c.cls}"><span class="emoji">${d.icon}</span><img alt="${d.name}"></div>
      <div class="card-body">
        <h3>${d.name}</h3><div class="latin">${d.latin}</div>
        <span class="pill ${c.cls}">${c.label}</span>
        <div class="teaser">${sortKey ? sortKey+'：'+nutText(d,sortKey) : '富含：'+d.nutrients.slice(0,3).join('、')}</div>
      </div>`;
    card.onclick=()=>openModal(idx);
    grid.appendChild(card);
    applyImg(d, card.querySelector('img'));
  });
  empty.style.display=list.length?'none':'block';
  countEl.textContent=`共 ${list.length} 個條目`;
}

const overlay=document.getElementById('overlay'),modal=document.getElementById('modal');
function openModal(i){
  const d=DATA[i],c=CAT[d.cat];
  const _tl=(d.nutri100||[]).map(r=>r[0]);
  const _norm=s=>s.replace(/[\s()（）]/g,'');
  const _KW=['蛋白','脂肪','碳水','Omega-3'];
  const _cov=tag=>{const nt=_norm(tag);return _tl.some(l=>{const nl=_norm(l);if(nl===nt||nl.indexOf(nt)>=0||nt.indexOf(nl)>=0)return true;return _KW.some(k=>nt.indexOf(k)>=0&&nl.indexOf(k)>=0);});};
  const _extra=d.nutrients.filter(n=>!_cov(n));
  const _extraNote=_extra.length?'<div class="basis">其他主要成分（未列每100克數值）：'+_extra.join('、')+'</div>':'';
  const nutriSec = d.nutri100 ? `
      <div class="sec"><h4>每100克營養（參考）</h4>
        <table class="nutri">${d.nutri100.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</table>
        <div class="basis">基準：${d.basis}</div>${_extraNote}
      </div>` : `
      <div class="sec"><h4>營養標示</h4>
        <p style="font-size:14px;color:var(--sub)">藥材以小劑量入藥，無常規每100克營養標示，故改列主要活性成分（見上）。</p>
      </div>`;
  modal.innerHTML=`
    <div class="m-photo ${c.cls}">
      <button class="close" onclick="closeModal()">&times;</button>
      <span class="emoji">${d.icon}</span><img alt="${d.name}">
      <span class="m-credit">圖片來源：維基百科</span>
    </div>
    <div class="modal-title"><h2>${d.name}</h2><div class="m-latin">${d.latin}</div></div>
    <div class="modal-body">
      <div class="sec"><h4>分類學</h4><p>${d.taxo}</p></div>
      <div class="sec"><h4>主要營養／活性成分</h4>
        <div class="tags">${d.nutrients.map(n=>`<span class="tag">${n}</span>`).join('')}</div></div>
      ${nutriSec}
      <div class="sec"><h4>功效與用途</h4><p>${d.benefit}</p></div>
      <div class="sec"><h4>查證來源</h4>
        <div class="links">
          <a class="lk" target="_blank" rel="noopener" href="${wikiUrl(d.wiki)}">維基百科（分類）</a>
          <a class="lk" target="_blank" rel="noopener" href="${d.evidence.url}">${d.evidence.label}</a>
        </div></div>
    </div>`;
  const img=modal.querySelector('.m-photo img'),credit=modal.querySelector('.m-credit'),
        em=modal.querySelector('.m-photo .emoji');
  fetchImg(d).then(src=>{ if(src){ img.src=src; img.style.display='block'; credit.style.display='block'; if(em) em.style.display='none'; } });
  overlay.classList.add('show');
}
function closeModal(){overlay.classList.remove('show');}
overlay.onclick=e=>{if(e.target===overlay)closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

const SORTOPTS={
  fish:[['Omega-3','Omega-3（高到低）'],['蛋白質','蛋白質（高到低）'],['熱量','熱量（高到低）']],
  plant:[['維生素C','維生素C（高到低）'],['膳食纖維','膳食纖維（高到低）'],['熱量','熱量（高到低）']],
  herb:[['熱量','熱量（高到低）'],['膳食纖維','膳食纖維（高到低）']]
};
const SORTGROUPS_ALL=[
  ['通用',[['熱量','熱量（高到低）'],['蛋白質','蛋白質（高到低）'],['膳食纖維','膳食纖維（高到低）']]],
  ['魚類',[['Omega-3','Omega-3（高到低）']]],
  ['植物',[['維生素C','維生素C（高到低）']]]
];
function rebuildSort(){
  const prev=sortEl.value;
  let html='<option value="">排序：預設</option>';
  if(curCat==='all'){
    for(const g of SORTGROUPS_ALL){
      html+='<optgroup label="'+g[0]+'">'+g[1].map(o=>'<option value="'+o[0]+'">'+o[1]+'</option>').join('')+'</optgroup>';
    }
  }else{
    html+=(SORTOPTS[curCat]||[]).map(o=>'<option value="'+o[0]+'">'+o[1]+'</option>').join('');
  }
  sortEl.innerHTML=html;
  sortEl.value=[...sortEl.options].some(o=>o.value===prev)?prev:'';
}
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');curCat=t.dataset.cat;rebuildSort();render();};
});
searchEl.addEventListener('input',render);
sortEl.addEventListener('change',render);
rebuildSort();render();
</script>
